<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RoomSync</title>

    <link rel="stylesheet" href="style.css">
</head>

<body class="form-page">

    <nav>
        <h2>RoomSync</h2>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="search.html">Search</a></li>
        </ul>
    </nav>

    <main class="form-container">
        <section class="form-card">
            <h1>Create Your Profile</h1>

            <p class="form-intro">
                Tell us about your basic roommate preferences.
            </p>

            <form onsubmit="return registerMessage()">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>

                <label for="budget">Monthly Budget</label>
                <input type="number" id="budget" name="budget" placeholder="Example: 900" required>

                <label for="cleanliness">Cleanliness Preference</label>
                <select id="cleanliness" name="cleanliness" required>
                    <option value="">Select one</option>
                    <option value="very-clean">Very clean</option>
                    <option value="moderate">Moderate</option>
                    <option value="relaxed">Relaxed</option>
                </select>

                <label for="schedule">Sleep Schedule</label>
                <select id="schedule" name="schedule" required>
                    <option value="">Select one</option>
                    <option value="early">Early sleeper</option>
                    <option value="night">Night owl</option>
                    <option value="flexible">Flexible</option>
                </select>

                <button type="submit">Create Profile</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 RoomSync. Built for CINF362 Final Project.</p>
    </footer>

</body>
</html>
