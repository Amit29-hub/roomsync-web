<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - RoomSync</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body class="form-page" onload="checkLogin()">
<div id="loader">
    <div class="loader-circle"></div>
</div>
    <nav>
        <h2>RoomSync</h2>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="search.html">Search</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
    </nav>

    <main class="form-container">
        <section class="form-card large-card">
            <h1>Roommate Compatibility Quiz</h1>

            <p class="form-intro">
                Answer a few questions to help RoomSync understand your living preferences.
            </p>

            <form onsubmit="return saveQuiz()">

                <label for="quizName">Your Name</label>
                <input type="text" id="quizName" required>

                <label for="quizCleanliness">Cleanliness Preference</label>
                <select id="quizCleanliness" required>
                    <option value="">Select one</option>
                    <option value="Very Clean">Very Clean</option>
                    <option value="Moderate">Moderate</option>
                    <option value="Relaxed">Relaxed</option>
                </select>

                <label for="quizSchedule">Sleep Schedule</label>
                <select id="quizSchedule" required>
                    <option value="">Select one</option>
                    <option value="Early Sleeper">Early Sleeper</option>
                    <option value="Night Owl">Night Owl</option>
                    <option value="Flexible">Flexible</option>
                </select>

                <label for="quizGuests">Guest Preference</label>
                <select id="quizGuests" required>
                    <option value="">Select one</option>
                    <option value="Rarely">Rarely has guests</option>
                    <option value="Sometimes">Sometimes has guests</option>
                    <option value="Often">Often has guests</option>
                </select>

                <button type="submit">Save My Preferences</button>
            </form>

            <div id="quizResult" class="result-box"></div>

            <button class="logout-btn" onclick="logoutUser()">Log Out</button>
        </section>
    </main>

    <footer>
        <p>© 2026 RoomSync. Built By Amit Mukhram</p>
    </footer>

</body>
</html>
